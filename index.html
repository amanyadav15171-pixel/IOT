<!DOCTYPE html>
<html>
<head>
<title>Smart Plant Disease Detection</title>

<style>

body{
    margin:0;
    font-family:'Segoe UI',Arial;
    background:linear-gradient(135deg,#d4fc79,#96e6a1);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:18px;
    width:450px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
    color:#2e7d32;
}

#camera{
    width:100%;
    border-radius:12px;
    border:4px solid #e8f5e9;
    margin-top:10px;
}

button{
    margin-top:20px;
    padding:14px 28px;
    border:none;
    border-radius:30px;
    background:linear-gradient(45deg,#43a047,#2e7d32);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

#result{
    margin-top:20px;
    padding:15px;
    background:#f1f8e9;
    border-radius:12px;
    color:#1b5e20;
    line-height:1.6;
}

.loading{
    color:#ff6f00;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>🌿 Smart Plant Disease Detection</h2>

<img id="camera"
src="http://192.168.43.182/capture">

<button onclick="capture()">CAPTURE & DETECT</button>

<h3 id="result"></h3>

</div>

<script>

async function capture(){

let resultBox=document.getElementById("result");
resultBox.innerHTML="<span class='loading'>🔍 Detecting...</span>";

let camera=document.getElementById("camera");

// refresh ESP32 image
camera.src="http://192.168.43.182/capture?t="+new Date().getTime();

await new Promise(r=>setTimeout(r,1000));

let response=await fetch(camera.src);
let blob=await response.blob();

let formData=new FormData();
formData.append("image",blob,"leaf.jpg");

let result=await fetch("/predict",{
method:"POST",
body:formData
});

let data=await result.json();

resultBox.innerHTML=
"🌱 <b>Plant:</b> "+data.plant+"<br>"+
"🔬 <b>Scientific:</b> "+data.scientific+"<br>"+
"🩺 <b>Status:</b> "+data.status+"<br>"+
"🍃 <b>Disease:</b> "+data.disease+"<br>"+
"📊 <b>Confidence:</b> "+data.confidence+"%";

}

</script>

</body>
</html>
